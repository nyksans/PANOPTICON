version: "3.9"

services:
  # -----------------------------------------------
  # PostgreSQL
  # -----------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: panopticon_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-panopticon}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - panopticon_net

  # -----------------------------------------------
  # Redis
  # -----------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: panopticon_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - panopticon_net

  # -----------------------------------------------
  # ChromaDB
  # -----------------------------------------------
  chromadb:
    image: chromadb/chroma:0.5.3
    container_name: panopticon_chroma
    ports:
      - 8001:8000
    volumes:
      - chroma_data:/chroma/.chroma
    env_file:
      - .env
    environment:
      CHROMA_SERVER_HOST: "0.0.0.0"
      ALLOW_RESET: "true"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - panopticon_net

  # -----------------------------------------------
  # FastAPI Backend
  # -----------------------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: panopticon_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - ../ai:/app/ai
      - evidence_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - panopticon_net

  # -----------------------------------------------
  # Celery Worker
  # -----------------------------------------------
  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: panopticon_worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    volumes:
      - ../backend:/app
      - ../ai:/app/ai
      - evidence_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping --timeout 10"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - panopticon_net

  # -----------------------------------------------
  # Celery Beat (periodic task scheduler)
  # -----------------------------------------------
  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: panopticon_beat
    command: celery -A app.celery_app beat --loglevel=info
    env_file:
      - .env
    volumes:
      - ../backend:/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - panopticon_net

  # -----------------------------------------------
  # Frontend (Next.js)
  # -----------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: panopticon_frontend
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - panopticon_net

networks:
  panopticon_net:
    driver: bridge
    name: panopticon_net

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  evidence_storage:
